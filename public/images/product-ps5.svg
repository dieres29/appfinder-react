<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2418"/>
      <stop offset="100%" style="stop-color:#0f1f12"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg2)"/>
  <!-- PS5 body simplified -->
  <ellipse cx="200" cy="100" rx="70" ry="75" fill="#1a1f2e" stroke="#2e3850" stroke-width="1.5"/>
  <ellipse cx="200" cy="100" rx="55" ry="60" fill="#151921"/>
  <!-- PS logo -->
  <text x="200" y="88" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="900" fill="#e8eaf0" opacity="0.15">PS5</text>
  <!-- Controller buttons -->
  <circle cx="185" cy="108" r="7" fill="#22c55e" opacity="0.7"/>
  <circle cx="215" cy="108" r="7" fill="#ef4444" opacity="0.7"/>
  <circle cx="200" cy="96" r="7" fill="#3b82f6" opacity="0.7"/>
  <circle cx="200" cy="120" r="7" fill="#f59e0b" opacity="0.7"/>
  <!-- Price -->
  <rect x="136" y="152" width="128" height="28" rx="6" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.3"/>
  <text x="200" y="171" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f97316">$1.899.000</text>
  <!-- Badges -->
  <rect x="16" y="14" width="68" height="22" rx="7" fill="#22c55e" opacity="0.9"/>
  <text x="50" y="29" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#0a0c10">Min. Dic</text>
  <rect x="316" y="14" width="68" height="22" rx="7" fill="#f97316" opacity="0.9"/>
  <text x="350" y="29" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#0a0c10">Score 8/10</text>
</svg>
