<svg xmlns="http://www.w3.org/2000/svg" width="340" height="320" viewBox="0 0 340 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2535"/>
      <stop offset="100%" style="stop-color:#252d3d"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="340" height="320" rx="20" fill="url(#bg)" stroke="#2e3850" stroke-width="1"/>
  <!-- Phone illustration -->
  <rect x="110" y="24" width="120" height="200" rx="18" fill="#0f1218" stroke="#2e3850" stroke-width="1.5"/>
  <rect x="118" y="38" width="104" height="168" rx="10" fill="#151921"/>
  <!-- Screen content -->
  <rect x="126" y="50" width="88" height="12" rx="3" fill="#1a1f2e"/>
  <rect x="126" y="68" width="60" height="8" rx="2" fill="#252d3d"/>
  <rect x="126" y="82" width="88" height="6" rx="2" fill="#1a1f2e"/>
  <rect x="126" y="92" width="70" height="6" rx="2" fill="#1a1f2e"/>
  <!-- Price highlight -->
  <rect x="126" y="106" width="88" height="26" rx="5" fill="url(#orange)" opacity="0.15"/>
  <text x="170" y="124" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f97316">$3.299.000</text>
  <!-- Score badge -->
  <rect x="126" y="140" width="50" height="18" rx="5" fill="#f97316"/>
  <text x="151" y="153" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#0a0c10">Score 9/10</text>
  <!-- Home indicator -->
  <rect x="148" y="222" width="44" height="4" rx="2" fill="#2e3850"/>
  <!-- Labels below card -->
  <text x="170" y="256" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e8eaf0">iPhone 15 128GB</text>
  <text x="170" y="274" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8a93a8">Mejor precio en Amazon</text>
  <!-- Store chips -->
  <rect x="82" y="288" width="64" height="20" rx="6" fill="#1a1f2e" stroke="#252d3d" stroke-width="1"/>
  <text x="114" y="302" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8a93a8">Amazon</text>
  <rect x="154" y="288" width="80" height="20" rx="6" fill="#1a1f2e" stroke="#252d3d" stroke-width="1"/>
  <text x="194" y="302" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8a93a8">MercadoLibre</text>
</svg>
