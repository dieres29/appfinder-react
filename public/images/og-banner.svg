<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0c10"/>
      <stop offset="50%" style="stop-color:#1a1420"/>
      <stop offset="100%" style="stop-color:#0f1218"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="200" fill="url(#bannerBg)"/>
  <rect width="1200" height="200" fill="url(#glow)"/>
  <!-- Grid lines -->
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <!-- Logo icon -->
  <rect x="60" y="72" width="56" height="56" rx="14" fill="#f97316"/>
  <circle cx="88" cy="97" r="13" fill="none" stroke="white" stroke-width="3"/>
  <line x1="97" y1="106" x2="107" y2="116" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Title -->
  <text x="136" y="108" font-family="sans-serif" font-size="38" font-weight="900" fill="#ffffff" letter-spacing="-1">App<tspan fill="#f97316">Finder</tspan></text>
  <text x="136" y="133" font-family="sans-serif" font-size="16" fill="#8a93a8" letter-spacing="0.5">Encuentra el mejor momento para comprar</text>
  <!-- Stats -->
  <text x="700" y="90" font-family="sans-serif" font-size="30" font-weight="900" fill="#f97316">2.4M+</text>
  <text x="700" y="112" font-family="sans-serif" font-size="12" fill="#8a93a8" letter-spacing="1">PRODUCTOS</text>
  <text x="880" y="90" font-family="sans-serif" font-size="30" font-weight="900" fill="#f97316">10+</text>
  <text x="880" y="112" font-family="sans-serif" font-size="12" fill="#8a93a8" letter-spacing="1">TIENDAS</text>
  <text x="1020" y="90" font-family="sans-serif" font-size="30" font-weight="900" fill="#f97316">98%</text>
  <text x="1020" y="112" font-family="sans-serif" font-size="12" fill="#8a93a8" letter-spacing="1">PRECISIÓN IA</text>
  <!-- Border bottom -->
  <rect x="0" y="196" width="1200" height="4" fill="#f97316" opacity="0.5"/>
</svg>
